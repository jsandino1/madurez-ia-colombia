<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MadurezIA Colombia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
:root{
  --p:#0066cc;--pd:#2997ff;--ink:#1d1d1f;--ink2:#6e6e73;--ink3:#7a7a7a;
  --canvas:#fff;--parch:#f5f5f7;--dark:#272729;--dark2:#1d1d1f;
  --hair:#d2d2d7;--hairsf:#f0f0f0;--green:#30d158;--orange:#ff9f0a;--red:#ff453a;--purp:#bf5af2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"SF Pro Text","Helvetica Neue",Arial,sans-serif;background:var(--parch);color:var(--ink);-webkit-font-smoothing:antialiased}

/* NAV */
.gnav{background:rgba(0,0,0,0.92);backdrop-filter:saturate(180%) blur(20px);height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.gnav-logo{color:#fff;font-size:15px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.gnav-logo span{color:var(--pd)}
.gnav-ctx{color:rgba(255,255,255,.45);font-size:12px;letter-spacing:-.12px}
.gnav-right{display:flex;align-items:center;gap:14px}
.gnav-user{color:rgba(255,255,255,.45);font-size:12px}
.btn-ghost-nav{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-size:12px;padding:5px 14px;border-radius:980px;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-ghost-nav:hover{color:#fff;border-color:rgba(255,255,255,.4)}
.btn-ghost-nav.danger{border-color:rgba(255,69,58,.4);color:#ff6961}

/* PAGE */
.page{max-width:1100px;margin:0 auto;padding:40px 28px 80px}
.page-sm{max-width:680px;margin:0 auto;padding:40px 28px 80px}
.page-xs{max-width:460px;margin:80px auto;padding:0 20px}

/* HERO */
.hero{background:var(--dark);min-height:calc(100vh - 44px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center}
.hero-eyebrow{color:var(--pd);font-size:14px;font-weight:400;letter-spacing:-.2px;margin-bottom:14px}
.hero-h1{font-family:-apple-system,"SF Pro Display",sans-serif;font-size:52px;font-weight:600;line-height:1.07;letter-spacing:-.28px;color:#fff;max-width:740px;margin-bottom:18px}
.hero-h1 span{color:var(--pd)}
.hero-sub{font-size:19px;font-weight:400;line-height:1.4;color:#ccc;max-width:520px;margin-bottom:40px;letter-spacing:.1px}
.hero-dims{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:860px;margin-top:56px;width:100%}
.hero-dim-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px 14px;text-align:left}
.hero-dim-icon{font-size:20px;margin-bottom:10px}
.hero-dim-name{font-size:12px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:6px}
.hero-dim-desc{font-size:11px;color:rgba(255,255,255,.45);line-height:1.5}

/* BUTTONS */
.btn-pill{background:var(--p);color:#fff;font-size:15px;font-weight:400;padding:10px 24px;border-radius:980px;border:none;cursor:pointer;font-family:inherit;letter-spacing:-.2px;transition:transform .1s;display:inline-block}
.btn-pill:hover{opacity:.9}
.btn-pill:active{transform:scale(.95)}
.btn-pill:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-pill-lg{font-size:17px;padding:14px 32px}
.btn-pill-sm{font-size:13px;padding:8px 18px}
.btn-ghost{background:transparent;color:var(--pd);font-size:15px;padding:10px 24px;border-radius:980px;border:1.5px solid rgba(41,151,255,.35);cursor:pointer;font-family:inherit;transition:all .2s}
.btn-ghost:hover{border-color:var(--pd);background:rgba(41,151,255,.06)}
.btn-util{background:var(--parch);color:var(--ink);font-size:12px;font-weight:500;padding:7px 14px;border-radius:8px;border:1px solid var(--hair);cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
.btn-util:hover{background:#e8e8ed}
.btn-util-blue{background:rgba(0,102,204,.07);color:var(--p);border-color:rgba(0,102,204,.15)}
.btn-util-blue:hover{background:rgba(0,102,204,.12)}
.btn-cancel{background:var(--parch);color:var(--ink);border:1px solid var(--hair);font-size:15px;padding:11px 22px;border-radius:980px;cursor:pointer;font-family:inherit}
.cta-row{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap}

/* CARDS */
.card{background:var(--canvas);border:1px solid var(--hairsf);border-radius:18px;padding:24px;margin-bottom:16px}
.card-0{padding:0;overflow:hidden}
.card-title{font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--canvas);border:1px solid var(--hairsf);border-radius:18px;padding:22px 24px}
.stat-val{font-size:38px;font-weight:600;letter-spacing:-1.5px;color:var(--ink);line-height:1}
.stat-label{font-size:13px;color:var(--ink2);margin-top:6px;letter-spacing:-.224px}
.stat-delta{font-size:12px;font-weight:500;margin-top:8px}

/* TABS */
.tabs-bar{display:flex;gap:3px;background:rgba(0,0,0,.05);border-radius:10px;padding:3px;margin-bottom:22px;width:fit-content}
.tab-btn{padding:7px 18px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--ink2);background:transparent;transition:all .2s;letter-spacing:-.224px}
.tab-btn.active{background:var(--canvas);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* SESION CARDS */
.sesion-card{background:var(--canvas);border:1px solid var(--hairsf);border-radius:14px;padding:18px 22px;display:flex;align-items:center;gap:16px;margin-bottom:10px;transition:box-shadow .2s}
.sesion-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.07)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--green)}.dot-o{background:var(--orange)}
.sesion-info{flex:1}
.sesion-name{font-size:15px;font-weight:600;color:var(--ink);letter-spacing:-.374px}
.sesion-meta{font-size:12px;color:var(--ink2);margin-top:3px}
.sesion-cod{font-weight:700;color:var(--p);font-family:monospace;font-size:13px}
.resp-badge{background:rgba(0,102,204,.08);color:var(--p);font-size:13px;font-weight:600;padding:5px 14px;border-radius:980px;white-space:nowrap}
.sesion-actions{display:flex;gap:8px;flex-shrink:0}

/* FORMS */
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;letter-spacing:-.224px}
.field label span{color:var(--red)}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;font-size:15px;font-family:inherit;color:var(--ink);background:var(--canvas);border:1px solid var(--hair);border-radius:10px;outline:none;letter-spacing:-.2px;transition:border-color .2s}
.field textarea{min-height:70px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(0,102,204,.1)}
.field input:disabled,.field select:disabled{background:var(--parch);color:var(--ink2);cursor:not-allowed}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* DARK FORM FIELDS */
.field-dark label{color:rgba(255,255,255,.7)}
.field-dark input,.field-dark select{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:#fff}
.field-dark input::placeholder{color:rgba(255,255,255,.3)}
.field-dark input:focus,.field-dark select:focus{border-color:var(--pd);box-shadow:0 0 0 3px rgba(41,151,255,.12)}

/* PROGRESS */
.prog-track{height:2px;background:rgba(255,255,255,.1);border-radius:99px;margin-bottom:44px;overflow:hidden}
.prog-fill{height:100%;background:var(--pd);border-radius:99px;transition:width .4s}
.steps{display:flex;gap:5px;margin-top:10px}
.step{flex:1;height:3px;border-radius:99px;background:rgba(255,255,255,.15);transition:background .3s}
.step.done{background:var(--pd)}.step.cur{background:var(--orange)}

/* WIZARD */
.q-eyebrow{font-size:11px;color:var(--pd);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.q-text{font-size:26px;font-weight:600;color:#fff;line-height:1.25;letter-spacing:-.3px;margin-bottom:28px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:14px;padding:15px 18px;border:1px solid rgba(255,255,255,.1);border-radius:13px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.03)}
.opt:hover{border-color:rgba(41,151,255,.4);background:rgba(41,151,255,.06)}
.opt.sel{border-color:var(--pd);background:rgba(41,151,255,.1)}
.opt-n{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:rgba(255,255,255,.4);flex-shrink:0;transition:all .2s}
.opt.sel .opt-n{background:var(--pd);color:#fff}
.opt-t{font-size:14px;color:rgba(255,255,255,.75);line-height:1.45;padding-top:2px}
.opt.sel .opt-t{color:#fff}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:28px}

/* RESULTS */
.res-hero{text-align:center;padding:48px 28px 36px;border-bottom:1px solid rgba(255,255,255,.08)}
.res-score{font-size:88px;font-weight:700;line-height:1;letter-spacing:-4px}
.res-level{font-size:26px;font-weight:600;margin-top:8px}
.res-desc{font-size:15px;color:#ccc;margin-top:5px}
.met-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:20px 28px;border-bottom:1px solid rgba(255,255,255,.08)}
.met-c{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px;text-align:center}
.met-v{font-size:30px;font-weight:600;color:#fff;letter-spacing:-1px}
.met-l{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.6px;margin-top:5px}
.met-s{font-size:11px;color:rgba(255,255,255,.3);margin-top:3px}
.radar-wrap{display:flex;justify-content:center;padding:20px 28px;border-bottom:1px solid rgba(255,255,255,.08)}
.dim-res-list{padding:20px 28px}
.dim-res-row{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.dim-res-n{font-size:12px;font-weight:500;width:180px;flex-shrink:0;color:rgba(255,255,255,.8);line-height:1.3}
.bar-t{flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.bar-f{height:100%;border-radius:99px;transition:width .6s}
.dim-pt{font-size:13px;font-weight:700;width:28px;text-align:right}
.nvtag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:980px;width:105px;text-align:center;flex-shrink:0}
.n1{background:#fee2e2;color:#991b1b}.n2{background:#fef3c7;color:#92400e}
.n3{background:#dbeafe;color:#1e40af}.n4{background:#ede9fe;color:#5b21b6}.n5{background:#d1fae5;color:#065f46}
.narr-box{margin:0 28px 24px;background:rgba(41,151,255,.1);border-left:3px solid var(--pd);border-radius:0 10px 10px 0;padding:16px 18px}
.narr-box p{font-size:14px;color:rgba(255,255,255,.85);line-height:1.7}
.ia-box{margin:0 28px 24px;background:rgba(48,209,88,.08);border-left:3px solid var(--green);border-radius:0 10px 10px 0;padding:16px 18px}
.ia-box p{font-size:14px;color:rgba(255,255,255,.85);line-height:1.7}
.cuello-tag{display:inline-flex;align-items:center;background:#fef3c7;color:#92400e;font-size:11px;font-weight:600;padding:2px 8px;border-radius:980px;gap:3px}
.tag-cuello{display:inline-flex;align-items:center;background:rgba(255,159,10,.15);color:#ff9f0a;font-size:11px;font-weight:600;padding:2px 8px;border-radius:980px;margin-left:5px}
.envio-ok{text-align:center;padding:28px 28px 36px}
.envio-ok .icon{font-size:44px;margin-bottom:10px}
.envio-ok h3{font-size:18px;font-weight:600;color:var(--green);margin-bottom:6px}
.envio-ok p{font-size:14px;color:rgba(255,255,255,.5)}

/* DASHBOARD */
.dash-header{background:var(--canvas);border:1px solid var(--hairsf);border-radius:18px;padding:26px 30px;margin-bottom:20px;display:flex;align-items:center;gap:20px}
.dash-cod{font-family:monospace;font-size:20px;font-weight:700;color:var(--p);background:rgba(0,102,204,.07);padding:10px 20px;border-radius:12px;letter-spacing:2px;white-space:nowrap}
.dim-row{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.dim-row:last-child{margin-bottom:0}
.dim-lbl{font-size:12px;font-weight:500;color:var(--ink);width:175px;flex-shrink:0;line-height:1.3}
.bar-track{flex:1;height:5px;background:var(--hairsf);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px}
.dist-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.dist-row:last-child{margin-bottom:0}
.dist-bt{flex:1;height:16px;background:var(--hairsf);border-radius:6px;overflow:hidden}
.dist-bf{height:100%;border-radius:6px}
.dist-cnt{font-size:12px;font-weight:600;width:20px;text-align:right;color:var(--ink2)}
.cuello-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--hairsf)}
.cuello-row:last-child{border-bottom:none}
.cuello-rank{width:24px;height:24px;border-radius:50%;background:var(--parch);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink2);flex-shrink:0}
.cuello-nom{flex:1;font-size:14px;font-weight:500;color:var(--ink);letter-spacing:-.2px}
.cuello-cnt{font-size:11px;font-weight:600;color:#92400e;background:#fef3c7;padding:3px 9px;border-radius:980px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}

/* TABLE */
.tabla-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--parch);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink2);border-bottom:1px solid var(--hair)}
td{padding:12px 14px;border-bottom:1px solid var(--hairsf);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--parch)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--canvas);border-radius:20px;padding:32px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:20px;font-weight:600;letter-spacing:-.5px;margin-bottom:22px}
.modal-btns{display:flex;justify-content:space-between;gap:10px;margin-top:22px}

/* BACK */
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--p);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:22px;letter-spacing:-.2px;background:none;border:none;font-family:inherit}

/* SESION BANNER */
.sesion-banner{background:rgba(41,151,255,.1);border:1px solid rgba(41,151,255,.2);border-radius:10px;padding:11px 16px;margin-bottom:24px;display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.7);flex-wrap:wrap}
.sesion-banner strong{color:var(--pd)}

/* ALERT */
.alert-e{padding:11px 15px;border-radius:10px;font-size:13px;margin-bottom:16px;background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.alert-ok{padding:11px 15px;border-radius:10px;font-size:13px;margin-bottom:16px;background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}

/* LOADING */
.loading{text-align:center;padding:60px 20px;color:var(--ink2)}
.spin{width:36px;height:36px;border:3px solid var(--hairsf);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* DARK SECTION */
.dark-section{background:var(--dark);min-height:calc(100vh - 44px);padding:0}

/* PAGE HEADER */
.ph{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px}
.ph-title{font-size:32px;font-weight:600;letter-spacing:-.5px;color:var(--ink)}
.ph-sub{font-size:14px;color:var(--ink2);margin-top:3px;letter-spacing:-.2px}

/* INICIO */
.inicio-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:560px;width:100%;margin-top:0}
.ic{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:30px 24px;cursor:pointer;transition:all .25s;text-align:center}
.ic:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);transform:translateY(-2px)}
.ic-icon{font-size:32px;margin-bottom:12px}
.ic h3{color:#fff;font-size:16px;font-weight:600;margin-bottom:6px;letter-spacing:-.3px}
.ic p{color:rgba(255,255,255,.5);font-size:13px;line-height:1.5}
.cod-wrap{margin-top:14px;display:flex;gap:8px}
.cod-inp{flex:1;padding:10px 14px;border-radius:8px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:15px;font-family:inherit;letter-spacing:2px;text-transform:uppercase;outline:none}
.cod-inp::placeholder{color:rgba(255,255,255,.3);letter-spacing:1px;text-transform:none}
.cod-inp:focus{border-color:var(--pd)}
.cod-btn{padding:10px 16px;background:var(--p);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:17px;transition:opacity .2s}
.cod-btn:hover{opacity:.85}

/* EMPTY */
.empty{text-align:center;padding:56px 28px;color:var(--ink2)}
.empty-i{font-size:40px;margin-bottom:10px}

@media(max-width:768px){
  .hero-h1{font-size:32px}.hero-dims{grid-template-columns:1fr 1fr}
  .stats-row{grid-template-columns:1fr 1fr}.grid-2{grid-template-columns:1fr}
  .field-row{grid-template-columns:1fr}.met-row{grid-template-columns:1fr}
  .dim-res-n{width:120px}.nvtag{display:none}
  .sesion-card{flex-wrap:wrap}.gnav-user{display:none}
  .inicio-cards{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect} = React;
// Credenciales manejadas server-side por Netlify Functions

async function api(accion, datos={}, token=null){
  const r=await fetch('/.netlify/functions/api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accion,token,...datos})});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||'Error en la API');
  return d;
}
async function sbSignIn(email,password){

  const d=await r.json();if(!r.ok)return{error:{message:d.error}};return d;
}

  {n:1,nom:"Exploración",desc:"La IA existe como concepto pero no como práctica institucional",col:"#ff453a",bg:"#fee2e2"},
  {n:2,nom:"Experimentación",desc:"Hay iniciativas puntuales sin estructura ni continuidad",col:"#ff9f0a",bg:"#fef3c7"},
  {n:3,nom:"Adopción",desc:"La IA empieza a integrarse de forma estructurada en áreas clave",col:"#0066cc",bg:"#dbeafe"},
  {n:4,nom:"Escalamiento",desc:"La IA opera a escala con gobernanza y genera valor medible",col:"#bf5af2",bg:"#ede9fe"},
  {n:5,nom:"Transformación",desc:"La IA es inseparable del modelo de negocio y se reinventa continuamente",col:"#30d158",bg:"#d1fae5"}
];

function calcRes(resp){
  const porDim=DIMS.map((d,di)=>{
    const pts=d.pregs.map((_,pi)=>resp[`${di}-${pi}`]||0);
    const prom=parseFloat((pts.reduce((a,b)=>a+b,0)/pts.length).toFixed(2));
    return{nombre:d.nombre,promedio:prom};
  });
  const IMP=parseFloat((porDim.reduce((a,d)=>a+d.promedio,0)/5).toFixed(2));
  const DR=porDim.reduce((m,d)=>d.promedio<m.promedio?d:m,porDim[0]);
  const brecha=parseFloat((IMP-DR.promedio).toFixed(2));
  return{porDim,IMP,DR,brecha,nivel:NIVELES[Math.min(Math.max(Math.round(IMP)-1,0),4)]};
}
function colPt(p){if(p>=4.5)return"#30d158";if(p>=3.5)return"#bf5af2";if(p>=2.5)return"#0066cc";if(p>=1.5)return"#ff9f0a";return"#ff453a";}
function nvPt(p){return NIVELES[Math.min(Math.max(Math.round(p)-1,0),4)];}

function narrText(res){
  const{IMP,DR,brecha,nivel}=res;
  let t=`Su organización tiene un Índice de Madurez Ponderado de ${IMP}/5, ubicándola en el nivel de ${nivel.nom}. `;
  if(brecha>1.2)t+=`La Dimensión Restrictiva es "${DR.nombre}" (${DR.promedio}/5). La Brecha Estratégica de ${brecha} puntos indica que algunas áreas están adelantadas respecto a este cuello de botella crítico. `;
  else if(brecha>0.5)t+=`La Dimensión Restrictiva es "${DR.nombre}" (${DR.promedio}/5) con una brecha moderada de ${brecha} puntos que conviene atender. `;
  else t+=`El desarrollo entre dimensiones es equilibrado. La dimensión con menor puntaje es "${DR.nombre}" (${DR.promedio}/5). `;
  if(IMP<2)t+='Se recomienda priorizar fundamentos: casos de uso concretos, gobernanza básica y alfabetización digital.';
  else if(IMP<3)t+='El siguiente paso es estructurar las iniciativas con una hoja de ruta formal y métricas claras.';
  else if(IMP<4)t+='La organización está lista para escalar. Extienda las prácticas exitosas y fortalezca la gobernanza transversal.';
  else t+='La organización está en posición de liderazgo. El reto es mantener la ventaja innovando continuamente.';
  return t;
}

// ── RADAR ────────────────────────────────────────────────────────────
function Radar({porDim,dark=true}){
  const cx=160,cy=150,r=100,n=5;
  const ang=porDim.map((_,i)=>Math.PI*2*i/n-Math.PI/2);
  const pt=(a,v)=>({x:cx+r*(v/5)*Math.cos(a),y:cy+r*(v/5)*Math.sin(a)});
  const grid=[1,2,3,4,5].map(lv=>ang.map(a=>pt(a,lv)).map(p=>`${p.x},${p.y}`).join(' '));
  const data=ang.map((a,i)=>pt(a,porDim[i].promedio));
  const labs=ang.map((a,i)=>({x:cx+(r+26)*Math.cos(a),y:cy+(r+26)*Math.sin(a),txt:porDim[i].nombre.split(' ').slice(0,2).join(' ')}));
  const gc=dark?'rgba(255,255,255,0.08)':'#f0f0f0';
  const tc=dark?'rgba(255,255,255,0.8)':'#1d1d1f';
  return React.createElement('svg',{width:320,height:300,viewBox:'0 0 320 300'},
    ...grid.map((pts,gi)=>React.createElement('polygon',{key:gi,points:pts,fill:gi===4?'rgba(0,102,204,0.05)':'none',stroke:gc,strokeWidth:1})),
    ...ang.map((a,i)=>React.createElement('line',{key:i,x1:cx,y1:cy,x2:cx+r*Math.cos(a),y2:cy+r*Math.sin(a),stroke:gc,strokeWidth:1})),
    React.createElement('polygon',{points:data.map(p=>`${p.x},${p.y}`).join(' '),fill:'rgba(0,102,204,0.15)',stroke:'#0066cc',strokeWidth:2,strokeLinejoin:'round'}),
    ...data.map((p,i)=>React.createElement('circle',{key:i,cx:p.x,cy:p.y,r:4,fill:'#0066cc',stroke:'#fff',strokeWidth:2})),
    ...labs.map((l,i)=>React.createElement('text',{key:i,x:l.x,y:l.y,textAnchor:'middle',dominantBaseline:'middle',fontSize:10,fontWeight:600,fill:tc,fontFamily:'-apple-system,sans-serif'},l.txt)),
    ...data.map((p,i)=>React.createElement('text',{key:i,x:p.x,y:p.y-12,textAnchor:'middle',fontSize:10,fontWeight:700,fill:'#2997ff',fontFamily:'-apple-system,sans-serif'},porDim[i].promedio))
  );
}

// ── APP ───────────────────────────────────────────────────────────────
function App(){
  const [vista,setVista]=useState('inicio');
  const [auth,setAuth]=useState(null);
  const [sesion,setSesion]=useState(null);
  const [part,setPart]=useState(null);
  const [resp,setResp]=useState({});
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    const cod=p.get('codigo');
    if(cod){
      api('buscar_sesion',{codigo:cod})
        .then(d=>{setSesion(d);setVista('form');})
        .catch(()=>{});
    }
  },[]);
  const logout=async()=>{await sbSignOut();setAuth(null);setVista('inicio');};
  const reset=()=>{setSesion(null);setPart(null);setResp({});setVista('inicio');};
  if(vista==='inicio')return React.createElement(Inicio,{onInstructor:()=>setVista('login'),onCodigo:(s)=>{setSesion(s);setVista('form');}});
  if(vista==='login')return React.createElement(Login,{onLogin:(a)=>{setAuth(a);setVista('panel');},onVolver:()=>setVista('inicio')});
  if(vista==='panel'&&auth)return React.createElement(Panel,{auth,onLogout:logout});
  if(vista==='form'&&sesion)return React.createElement(FormPart,{sesion,onOk:(p)=>{setPart(p);setVista('wizard');}});
  if(vista==='wizard'&&part&&sesion)return React.createElement(Wizard,{part,sesion,onOk:(r)=>{setResp(r);setVista('resultados');}});
  if(vista==='resultados'&&part&&sesion)return React.createElement(Resultados,{part,resp,sesion,onNuevo:reset});
  return React.createElement(Inicio,{onInstructor:()=>setVista('login'),onCodigo:(s)=>{setSesion(s);setVista('form');}});
}
ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
