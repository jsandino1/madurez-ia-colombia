<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MadurezIA Colombia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{--azul:#0F1F3D;--anil:#1B4FD8;--anil-c:#EEF2FF;--ambar:#F59E0B;--ambar-c:#FEF3C7;--verde:#059669;--verde-c:#D1FAE5;--rojo:#DC2626;--rojo-c:#FEE2E2;--purp:#7C3AED;--purp-c:#EDE9FE;--blanco:#fff;--fondo:#F7F8FA;--borde:#E2E8F0;--texto:#1E293B;--texto2:#64748B;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--fondo);color:var(--texto);min-height:100vh}
.header{background:var(--azul);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--anil);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{color:#fff;font-weight:700;font-size:15px}
.logo-sub{color:#94A3B8;font-size:11px}
.header-right{display:flex;align-items:center;gap:10px}
.header-user{color:#94A3B8;font-size:12px}
.btn-nav{background:transparent;border:1px solid rgba(255,255,255,0.2);color:#CBD5E1;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif}
.btn-nav:hover{background:rgba(255,255,255,0.1);color:#fff}
.btn-nav.danger{border-color:rgba(220,38,38,0.4);color:#FCA5A5}
.main{max-width:820px;margin:0 auto;padding:36px 20px 80px}
.main-w{max-width:1060px;margin:0 auto;padding:36px 20px 80px}
.card{background:#fff;border-radius:14px;border:1px solid var(--borde);box-shadow:0 4px 20px rgba(15,31,61,.09);overflow:hidden;margin-bottom:20px}
.card-h{background:var(--azul);padding:24px 28px}
.card-h h2{color:#fff;font-size:19px;font-weight:700;margin-bottom:3px}
.card-h p{color:#94A3B8;font-size:13px}
.card-b{padding:28px}
.inicio-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(135deg,#0F1F3D 0%,#1B3A6B 100%)}
.inicio-logo{text-align:center;margin-bottom:40px}
.inicio-logo h1{color:#fff;font-size:28px;font-weight:800;margin-bottom:6px}
.inicio-logo p{color:#94A3B8;font-size:14px}
.inicio-cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:600px;width:100%}
.inicio-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:32px 24px;cursor:pointer;transition:all .25s;text-align:center}
.inicio-card:hover{background:rgba(255,255,255,0.13);border-color:rgba(255,255,255,0.3);transform:translateY(-2px)}
.inicio-card .ic-icon{font-size:36px;margin-bottom:12px}
.inicio-card h3{color:#fff;font-size:16px;font-weight:700;margin-bottom:6px}
.inicio-card p{color:#94A3B8;font-size:13px;line-height:1.5}
.codigo-wrap{margin-top:12px;display:flex;gap:8px}
.codigo-input{flex:1;padding:11px 14px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#fff;font-size:15px;font-family:'Inter',sans-serif;letter-spacing:2px;text-transform:uppercase;outline:none}
.codigo-input::placeholder{color:#94A3B8;letter-spacing:1px;text-transform:none}
.codigo-input:focus{border-color:#1B4FD8}
.btn-codigo{padding:11px 16px;background:#1B4FD8;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:18px}
.form-g{margin-bottom:18px}
.form-r{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
label span{color:var(--rojo)}
input,select,textarea{width:100%;padding:10px 13px;border:1.5px solid var(--borde);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;color:var(--texto);background:#fff;outline:none;transition:border-color .2s}
textarea{resize:vertical;min-height:70px}
input:focus,select:focus,textarea:focus{border-color:var(--anil);box-shadow:0 0 0 3px rgba(27,79,216,.09)}
input:disabled,select:disabled{background:#F1F5F9;color:#94A3B8;cursor:not-allowed}
.btn{padding:11px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .2s}
.btn-p{background:var(--anil);color:#fff}
.btn-p:hover{background:#1440B8;transform:translateY(-1px);box-shadow:0 4px 14px rgba(27,79,216,.28)}
.btn-p:disabled{background:var(--borde);color:var(--texto2);transform:none;box-shadow:none;cursor:not-allowed}
.btn-s{background:var(--fondo);color:var(--texto);border:1.5px solid var(--borde)}
.btn-s:hover{background:var(--borde)}
.btn-full{width:100%}
.btn-row{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:10px}
.sesion-item{background:#fff;border:1px solid var(--borde);border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:16px;margin-bottom:12px;transition:box-shadow .2s}
.sesion-item:hover{box-shadow:0 4px 16px rgba(15,31,61,.08)}
.sesion-info{flex:1}
.sesion-nombre{font-size:15px;font-weight:700;margin-bottom:3px}
.sesion-meta{font-size:12px;color:var(--texto2)}
.sesion-codigo{font-weight:700;color:var(--anil)}
.sesion-resp{font-size:13px;font-weight:700;color:var(--anil);min-width:60px;text-align:center}
.sesion-acciones{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:7px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;white-space:nowrap}
.btn-sm-anil{background:var(--anil-c);color:var(--anil)}
.btn-sm-verde{background:var(--verde-c);color:#065F46}
.prog-wrap{margin-bottom:28px}
.prog-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--texto2)}
.prog-bar{height:5px;background:var(--borde);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--anil),#6366F1);border-radius:99px;transition:width .4s}
.steps{display:flex;gap:5px;margin-top:10px}
.step{flex:1;height:4px;border-radius:99px;background:var(--borde)}
.step.done{background:var(--anil)}.step.active{background:var(--ambar)}
.dim-badge{display:inline-flex;align-items:center;gap:7px;background:var(--anil-c);color:var(--anil);padding:5px 13px;border-radius:99px;font-size:11px;font-weight:600;margin-bottom:16px}
.dim-title{font-size:17px;font-weight:700;margin-bottom:5px}
.dim-desc{font-size:13px;color:var(--texto2);margin-bottom:24px;line-height:1.6}
.preg-wrap{margin-bottom:26px}
.preg-num{font-size:11px;font-weight:600;color:var(--texto2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.preg-texto{font-size:14px;font-weight:600;margin-bottom:14px;line-height:1.5}
.opciones{display:flex;flex-direction:column;gap:7px}
.opcion{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:1.5px solid var(--borde);border-radius:9px;cursor:pointer;background:#fff;transition:all .2s}
.opcion:hover,.opcion.sel{border-color:var(--anil);background:var(--anil-c)}
.op-n{width:26px;height:26px;border-radius:50%;background:var(--borde);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--texto2);flex-shrink:0}
.opcion.sel .op-n{background:var(--anil);color:#fff}
.op-t{font-size:13px;line-height:1.5;padding-top:3px}
.res-hero{text-align:center;padding:36px 28px 28px;border-bottom:1px solid var(--borde)}
.nivel-n{font-size:66px;font-weight:800;line-height:1}
.nivel-nom{font-size:21px;font-weight:700;margin-top:4px}
.nivel-sub{font-size:13px;color:var(--texto2);margin-top:3px}
.met-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:20px 28px;border-bottom:1px solid var(--borde)}
.met-c{background:var(--fondo);border-radius:11px;padding:15px;text-align:center}
.met-v{font-size:26px;font-weight:800;color:var(--azul)}
.met-l{font-size:11px;font-weight:600;color:var(--texto2);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.met-s{font-size:11px;color:var(--texto2);margin-top:2px}
.radar-wrap{display:flex;justify-content:center;padding:20px 28px;border-bottom:1px solid var(--borde)}
.dim-res{padding:20px 28px}
.dim-res-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.dim-res-n{font-size:12px;font-weight:600;width:185px;flex-shrink:0;line-height:1.3}
.barra-wrap{flex:1;height:7px;background:var(--borde);border-radius:99px;overflow:hidden}
.barra-fill{height:100%;border-radius:99px;transition:width .6s}
.dim-pt{font-size:13px;font-weight:700;width:28px;text-align:right}
.nivel-tag{font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px;width:105px;text-align:center;flex-shrink:0}
.narr{margin:0 28px 24px;background:var(--anil-c);border-left:4px solid var(--anil);border-radius:0 8px 8px 0;padding:14px 18px}
.narr p{font-size:13px;color:var(--azul);line-height:1.7}
.tag-cuello{display:inline-flex;align-items:center;gap:3px;background:var(--ambar-c);color:#92400E;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:600}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.b1{background:#FEE2E2;color:#991B1B}.b2{background:#FEF3C7;color:#92400E}.b3{background:#EEF2FF;color:#1E40AF}.b4{background:#EDE9FE;color:#5B21B6}.b5{background:#D1FAE5;color:#065F46}
.alert{padding:11px 15px;border-radius:8px;font-size:13px;margin-bottom:16px}
.alert-e{background:#FEE2E2;color:#DC2626;border:1px solid #FECACA}
.alert-ok{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.loading{text-align:center;padding:60px 28px;color:var(--texto2)}
.spin{width:38px;height:38px;border:3px solid var(--borde);border-top-color:var(--anil);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;gap:4px;background:var(--fondo);border-radius:9px;padding:4px;margin-bottom:20px;border:1px solid var(--borde)}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;color:var(--texto2);border:none;background:transparent;font-family:'Inter',sans-serif}
.tab.active{background:#fff;color:var(--anil);box-shadow:0 1px 5px rgba(0,0,0,.07)}
.stats-r{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-c{background:#fff;border:1px solid var(--borde);border-radius:11px;padding:18px}
.stat-v{font-size:30px;font-weight:800;color:var(--azul)}
.stat-l{font-size:12px;color:var(--texto2);margin-top:3px;font-weight:500}
.stat-d{font-size:12px;color:var(--verde);font-weight:600;margin-top:5px}
.tabla{width:100%;border-collapse:collapse;font-size:13px}
.tabla th{background:var(--fondo);padding:11px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--texto2);border-bottom:2px solid var(--borde)}
.tabla td{padding:12px 14px;border-bottom:1px solid var(--borde);vertical-align:middle}
.tabla tr:hover td{background:var(--fondo)}
.empty{text-align:center;padding:56px 28px;color:var(--texto2)}
.empty-i{font-size:44px;margin-bottom:10px}
.correo-ok{text-align:center;padding:20px 28px 28px}
.co-i{font-size:44px;margin-bottom:10px}
.co-t{font-size:17px;font-weight:700;color:var(--verde);margin-bottom:5px}
.co-s{font-size:13px;color:var(--texto2)}
.sec-t{font-size:17px;font-weight:700;margin-bottom:3px}
.sec-s{font-size:13px;color:var(--texto2);margin-bottom:20px}
.sesion-banner{background:var(--anil-c);border:1px solid #BFDBFE;border-radius:10px;padding:12px 16px;margin-bottom:24px;display:flex;align-items:center;gap:10px;font-size:13px;flex-wrap:wrap}
.sesion-banner strong{color:var(--anil)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:#fff;border-radius:16px;padding:32px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:18px;font-weight:700;margin-bottom:20px}
@media(max-width:600px){.form-r{grid-template-columns:1fr}.met-row{grid-template-columns:1fr}.stats-r{grid-template-columns:repeat(2,1fr)}.inicio-cards{grid-template-columns:1fr}.dim-res-n{width:120px}.nivel-tag{display:none}.sesion-acciones{flex-direction:column}}
</style>
</head>

// ── API: todas las llamadas de datos van por Netlify Function ────────
async function api(accion, datos = {}, token = null) {
  const r = await fetch('/.netlify/functions/api', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ accion, token, ...datos })
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || 'Error en la API');
  return d;
}

// ── AUTH: login/signup directo con Supabase (solo auth, no datos) ────
async function sbSignIn(email, password) {
  const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: {'Content-Type':'application/json','apikey':SB_KEY},
    body: JSON.stringify({email, password})
  });
  return r.json();
}
async function sbSignUp(email, password) {
  const r = await fetch(`${SB_URL}/auth/v1/signup`, {
    method: 'POST',
    headers: {'Content-Type':'application/json','apikey':SB_KEY},
    body: JSON.stringify({email, password})
  });
  return r.json();
}
async function sbSignOut(token) {
  await fetch(`${SB_URL}/auth/v1/logout`, {
    method: 'POST',
    headers: {'apikey':SB_KEY,'Authorization':`Bearer ${token}`}
  });
}

function calcRes(resp){
  const porDim=DIMS.map((d,di)=>{
    const pts=d.pregs.map((_,pi)=>resp[`${di}-${pi}`]||0);
    const prom=parseFloat((pts.reduce((a,b)=>a+b,0)/pts.length).toFixed(2));
    return {nombre:d.nombre,promedio:prom};
  });
  const IMP=parseFloat((porDim.reduce((a,d)=>a+d.promedio,0)/5).toFixed(2));
  const DR=porDim.reduce((m,d)=>d.promedio<m.promedio?d:m,porDim[0]);
  const brecha=parseFloat((IMP-DR.promedio).toFixed(2));
  return {porDim,IMP,DR,brecha,nivel:NIVELES[Math.min(Math.max(Math.round(IMP)-1,0),4)]};
}
function colPt(p){if(p>=4.5)return"#059669";if(p>=3.5)return"#7C3AED";if(p>=2.5)return"#1B4FD8";if(p>=1.5)return"#D97706";return"#DC2626";}
function nvPt(p){return NIVELES[Math.min(Math.max(Math.round(p)-1,0),4)];}

function narrText(res){
  const {IMP,DR,brecha,nivel}=res;
  let t=`Su organización tiene un Índice de Madurez Ponderado de ${IMP}/5, ubicándola en el nivel de ${nivel.nom}. `;
  if(brecha>1.2)t+=`La Dimensión Restrictiva es "${DR.nombre}" (${DR.promedio}/5). La Brecha Estratégica de ${brecha} puntos indica que algunas áreas están adelantadas respecto a este cuello de botella crítico. `;
  else if(brecha>0.5)t+=`La Dimensión Restrictiva es "${DR.nombre}" (${DR.promedio}/5) con una brecha moderada de ${brecha} puntos que conviene atender. `;
  else t+=`El desarrollo entre dimensiones es equilibrado. La dimensión con menor puntaje es "${DR.nombre}" (${DR.promedio}/5). `;
  if(IMP<2)t+='Se recomienda priorizar fundamentos: casos de uso concretos, gobernanza básica y alfabetización digital.';
  else if(IMP<3)t+='El siguiente paso es estructurar las iniciativas con una hoja de ruta formal y métricas claras.';
  else if(IMP<4)t+='La organización está lista para escalar. Extienda las prácticas exitosas y fortalezca la gobernanza transversal.';
  else t+='La organización está en posición de liderazgo. El reto es mantener la ventaja innovando continuamente.';
  return t;
}

function Radar({porDim}){
  const cx=170,cy=160,r=110,n=5;
  const ang=porDim.map((_,i)=>Math.PI*2*i/n-Math.PI/2);
  const pt=(a,v)=>({x:cx+r*(v/5)*Math.cos(a),y:cy+r*(v/5)*Math.sin(a)});
  const grid=[1,2,3,4,5].map(lv=>ang.map(a=>pt(a,lv)).map(p=>`${p.x},${p.y}`).join(' '));
  const data=ang.map((a,i)=>pt(a,porDim[i].promedio));
  const labs=ang.map((a,i)=>({x:cx+(r+28)*Math.cos(a),y:cy+(r+28)*Math.sin(a),txt:porDim[i].nombre.split(' ').slice(0,2).join(' ')}));
  return React.createElement('svg',{width:340,height:320,viewBox:'0 0 340 320'},
    ...grid.map((pts,gi)=>React.createElement('polygon',{key:gi,points:pts,fill:gi===4?'rgba(27,79,216,.04)':'none',stroke:'#E2E8F0',strokeWidth:1})),
    ...ang.map((a,i)=>React.createElement('line',{key:i,x1:cx,y1:cy,x2:cx+r*Math.cos(a),y2:cy+r*Math.sin(a),stroke:'#E2E8F0',strokeWidth:1})),
    React.createElement('polygon',{points:data.map(p=>`${p.x},${p.y}`).join(' '),fill:'rgba(27,79,216,.14)',stroke:'#1B4FD8',strokeWidth:2.5,strokeLinejoin:'round'}),
    ...data.map((p,i)=>React.createElement('circle',{key:i,cx:p.x,cy:p.y,r:5,fill:'#1B4FD8',stroke:'#fff',strokeWidth:2})),
    ...labs.map((l,i)=>React.createElement('text',{key:i,x:l.x,y:l.y,textAnchor:'middle',dominantBaseline:'middle',fontSize:10,fontWeight:600,fill:'#1E293B',fontFamily:'Inter,sans-serif'},l.txt)),

  );
}

function App(){
  const [vista,setVista]=useState('inicio');
  const [auth,setAuth]=useState(null);
  const [sesion,setSesion]=useState(null);
  const [part,setPart]=useState(null);
  const [resp,setResp]=useState({});

  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    const cod=p.get('codigo');
    if(cod){
      api('buscar_sesion',{codigo:cod})
        .then(d=>{setSesion(d);setVista('form');})
        .catch(()=>{});
    }
  },[]);

  const logout=async()=>{if(auth)await sbSignOut(auth.token);setAuth(null);setVista('inicio');};
  const reset=()=>{setSesion(null);setPart(null);setResp({});setVista('inicio');};

  if(vista==='inicio')return React.createElement(Inicio,{onInstructor:()=>setVista('login'),onCodigo:(s)=>{setSesion(s);setVista('form');}});
  if(vista==='login')return React.createElement(Login,{onLogin:(a)=>{setAuth(a);setVista('panel');},onVolver:()=>setVista('inicio')});
  if(vista==='panel'&&auth)return React.createElement(Panel,{auth,onLogout:logout});
  if(vista==='form'&&sesion)return React.createElement(FormPart,{sesion,onOk:(p)=>{setPart(p);setVista('wizard');}});
  if(vista==='wizard'&&part&&sesion)return React.createElement(Wizard,{part,sesion,onOk:(r)=>{setResp(r);setVista('resultados');}});
  if(vista==='resultados'&&part&&sesion)return React.createElement(Resultados,{part,resp,sesion,onNuevo:reset});
  return React.createElement(Inicio,{onInstructor:()=>setVista('login'),onCodigo:(s)=>{setSesion(s);setVista('form');}});
}

loadConfig().then(() => ReactDOM.render(React.createElement(App),document.getElementById('root')));
